name: Deploy to AWS prd

# =============================================================================
# Job 構成
# =============================================================================
# build → migrate → ┬→ deploy-api → approve-api (★ GitHub UI でレビュー承認) → 完了
#                   │                  ↘ reject-api (失敗 / キャンセル時の rollback)
#                   └→ deploy-worker (rolling 完走)
#
# - dev はローリングデプロイ (deploy-aws-dev.yml) だが prd は Blue/Green + 承認ゲート
# - deploy-api: Blue/Green を投入するだけで即抜ける (wait-for-service-stability=false)
# - approve-api: GitHub Environment `prd-api-approval` の Required reviewers で
#   レビュアー承認を求める。承認されると SSM=approved を書いて ECS の bake/swap を進める
# - reject-api: approve-api が reject されたり失敗 / キャンセルされた時に
#   SSM=rejected を書いて ECS Blue/Green を自動 rollback させる
# - deploy-worker: rolling deploy、approve-api には依存せず並列で完走する
# =============================================================================

on:
  workflow_dispatch:

# 並列 deploy を禁止する。
# - cancel-in-progress: false → 既存 run はキャンセルせず、後発 run はキュー待ち
# - approve-api の承認待ちで止まっている間も「進行中」とカウントされるので、
#   承認順 = deploy 順が強制され、SSM パラメータの race condition が発生しない
concurrency:
  group: deploy-aws-prd
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1

  # =============================================================================
  # prd 環境のリソース名 (Terraform 側の typing-royale-prd-* と一致)
  # =============================================================================
  PROJECT_NAME: typing-royale
  ENVIRONMENT: prd

  # ECR (environment 非依存だが project_name は含む)
  ECR_API_REPO: typing-royale-api-server
  ECR_WORKER_REPO: typing-royale-worker
  ECR_MIGRATION_REPO: typing-royale-migration
  ECR_CRON_REPO: typing-royale-cron

  # ECS リソース (project_name-environment- プレフィックス)
  ECS_CLUSTER: typing-royale-prd-cluster
  ECS_API_SERVICE: typing-royale-prd-api
  ECS_WORKER_SERVICE: typing-royale-prd-worker
  ECS_MIGRATION_TASK_DEF: typing-royale-prd-migration
  ECS_CRON_TASK_DEF: typing-royale-prd-cron

  # SSM パラメータ (modules/ecs-workload の Lambda deployment_hook が watch する)
  SSM_APPROVAL_PARAM: /typing-royale-prd-api/deploy/approval

  # VPC リソース解決用 (Terraform 側 modules/vpc の Name タグと一致)
  ECS_SECURITY_GROUP_NAME: typing-royale-prd-ecs
  PRIVATE_SUBNET_NAME_PREFIX: typing-royale-prd-private # `${prefix}*` で wildcard 検索する

jobs:
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # GitHub Environments で AWS_ROLE_ARN を env-scope から取得。
    # prd Environment 自体に Required reviewers を付けるかは運用ポリシー次第:
    #   - build 段階で承認を要求したい → prd Environment に Required reviewers を設定
    #   - api の切替時のみ承認したい → prd-api-approval だけに Required reviewers
    # 本ファイルは後者（切替時承認）を想定。
    environment: prd
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry: ${{ steps.ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # mutable な :latest を避け、コミット SHA タグ (例: :abc123def456) のみを push する
      - name: Build & push API image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_API_REPO }}"
          docker buildx build \
            --platform linux/amd64 \
            -f apps/api/Dockerfile \
            -t "${IMAGE}:${{ steps.meta.outputs.image_tag }}" \
            --push \
            .

      - name: Build & push worker image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_WORKER_REPO }}"
          docker buildx build \
            --platform linux/amd64 \
            -f apps/worker/Dockerfile \
            -t "${IMAGE}:${{ steps.meta.outputs.image_tag }}" \
            --push \
            .

      # cron image は crawler / batch を EventBridge Scheduler から RunTask する用
      - name: Build & push cron image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_CRON_REPO }}"
          docker buildx build \
            --platform linux/amd64 \
            -f apps/cron/Dockerfile \
            -t "${IMAGE}:${{ steps.meta.outputs.image_tag }}" \
            --push \
            .

      # migration image は本番 API イメージから分離 (Prisma CLI / devDeps を本番に混入させない)
      - name: Build & push migration image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_MIGRATION_REPO }}"
          docker buildx build \
            --platform linux/amd64 \
            -f apps/api/Dockerfile.migration \
            -t "${IMAGE}:${{ steps.meta.outputs.image_tag }}" \
            --push \
            .

  migrate:
    name: Run Prisma Migration
    needs: build
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 現行 migration task definition の image を build job の SHA タグに書き換えて新リビジョンを register する。
      - name: Register migration task definition with new image
        id: register
        env:
          IMAGE: ${{ needs.build.outputs.registry }}/${{ env.ECR_MIGRATION_REPO }}:${{ needs.build.outputs.image_tag }}
        run: |
          TASK_DEF_FILE=$(mktemp)
          aws ecs describe-task-definition \
            --task-definition "${ECS_MIGRATION_TASK_DEF}" \
            --query taskDefinition \
            | jq --arg IMAGE "${IMAGE}" '
                .containerDefinitions[0].image = $IMAGE
                | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
              ' > "${TASK_DEF_FILE}"

          REVISION_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://${TASK_DEF_FILE}" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "Registered migration task definition: ${REVISION_ARN}"
          echo "revision_arn=${REVISION_ARN}" >> "$GITHUB_OUTPUT"

      # Terraform output や GitHub Secrets で固定化せず、AWS リソースのタグから動的に解決する。
      - name: Resolve network configuration from tags
        id: network
        run: |
          set -euo pipefail

          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Project,Values=${PROJECT_NAME}" "Name=tag:Environment,Values=${ENVIRONMENT}" \
            --query 'Vpcs[0].VpcId' --output text)

          if [ -z "${VPC_ID}" ] || [ "${VPC_ID}" = "None" ]; then
            echo "::error::VPC not found (tag:Project=${PROJECT_NAME} tag:Environment=${ENVIRONMENT})"
            exit 1
          fi

          # isolated subnet が含まれないように Name でフィルタリング
          PRIVATE_SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=tag:Name,Values=${PRIVATE_SUBNET_NAME_PREFIX}*" \
            --query 'Subnets[*].SubnetId' --output text | tr '\t' ',')

          ECS_SG=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=tag:Name,Values=${ECS_SECURITY_GROUP_NAME}" \
            --query 'SecurityGroups[0].GroupId' --output text)

          if [ -z "${PRIVATE_SUBNETS}" ] || [ -z "${ECS_SG}" ] || [ "${ECS_SG}" = "None" ]; then
            echo "::error::Failed to resolve subnets or security group (VPC=${VPC_ID} subnets='${PRIVATE_SUBNETS}' sg='${ECS_SG}')"
            exit 1
          fi

          echo "Resolved: VPC=${VPC_ID} subnets=${PRIVATE_SUBNETS} ecs_sg=${ECS_SG}"
          echo "private_subnets=${PRIVATE_SUBNETS}" >> "$GITHUB_OUTPUT"
          echo "ecs_security_group=${ECS_SG}" >> "$GITHUB_OUTPUT"

      - name: Run Prisma migration
        env:
          PRIVATE_SUBNETS: ${{ steps.network.outputs.private_subnets }}
          ECS_SECURITY_GROUP: ${{ steps.network.outputs.ecs_security_group }}
          REVISION_ARN: ${{ steps.register.outputs.revision_arn }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --task-definition "${REVISION_ARN}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${PRIVATE_SUBNETS}],securityGroups=[${ECS_SECURITY_GROUP}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: ${TASK_ARN}"

          aws ecs wait tasks-stopped \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}"

          # 診断情報を常に出力 (stopCode / stoppedReason / コンテナの reason / lastStatus を含む)。
          echo "=== Task details ==="
          aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --query 'tasks[0].{stopCode:stopCode,stoppedReason:stoppedReason,containers:containers[*].{name:name,exitCode:exitCode,reason:reason,lastStatus:lastStatus}}' \
            --output yaml

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Migration failed with exit code ${EXIT_CODE}"
            aws logs filter-log-events \
              --log-group-name "/ecs/${ECS_MIGRATION_TASK_DEF}" \
              --limit 200 \
              --query 'events[*].message' \
              --output text || true
            exit 1
          fi

  # =========================================================================
  # API service (Blue/Green)
  # =========================================================================
  # API は Blue/Green デプロイで、SSM 承認待ちがあるため wait-for-service-stability=false

  deploy-api:
    name: Deploy API service
    needs: [build, migrate]
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download API task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_API_SERVICE}" \
            --query taskDefinition \
            > task-def-api.json

      - name: Render API task definition with new image
        id: render-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-api.json
          container-name: ${{ env.ECS_API_SERVICE }}
          image: ${{ needs.build.outputs.registry }}/${{ env.ECR_API_REPO }}:${{ needs.build.outputs.image_tag }}

      - name: Deploy API service (submit only, no wait)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-api.outputs.task-definition }}
          service: ${{ env.ECS_API_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          # ★ false: green に新 task を起動する API call まで実行し、承認・bake は待たない
          # 完了確認 / 承認は後続の approve-api job (GitHub Environment) で行う
          wait-for-service-stability: false

  # =========================================================================
  # API service の承認 (GitHub Environment Required reviewers)
  # =========================================================================
  # deploy-api 完了後、Actions UI に "Review pending deployments" ボタンが出る。
  # 承認者がボタンを押すと本 job が実行され、SSM パラメータを approved に更新する
  # → ECS の deployment_hook Lambda が SUCCEEDED 返却 → production traffic shift。

  approve-api:
    name: Approve API deployment
    needs: deploy-api
    runs-on: ubuntu-latest
    environment: prd-api-approval # 承認をGithub UIで行うために環境を用意
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set SSM approval to "approved"
        run: |
          aws ssm put-parameter \
            --name "${SSM_APPROVAL_PARAM}" \
            --value "approved" \
            --overwrite
          echo "Approval set → ECS が production traffic shift + 10 分 bake time に進む"

  # GitHub Environment で reject された場合 (workflow が失敗扱いになる) や
  # workflow がキャンセルされた場合に、SSM を rejected に書き換えて ECS の
  # Blue/Green を自動 rollback させる。
  reject-api:
    name: Reject API deployment (cleanup on failure/cancel)
    needs: [deploy-api, approve-api]
    if: ${{ failure() || cancelled() }}
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set SSM approval to "rejected"
        run: |
          aws ssm put-parameter \
            --name "${SSM_APPROVAL_PARAM}" \
            --value "rejected" \
            --overwrite
          echo "Rejection set → ECS が Blue/Green を rollback"

  # =========================================================================
  # worker service (rolling)
  # =========================================================================
  # worker は ALB を持たないため rolling deploy で完走を待つ。
  deploy-worker:
    name: Deploy worker service
    needs: [build, migrate]
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download worker task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_WORKER_SERVICE}" \
            --query taskDefinition \
            > task-def-worker.json

      - name: Render worker task definition with new image
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-worker.json
          container-name: ${{ env.ECS_WORKER_SERVICE }}
          image: ${{ needs.build.outputs.registry }}/${{ env.ECR_WORKER_REPO }}:${{ needs.build.outputs.image_tag }}

      - name: Deploy worker service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-worker.outputs.task-definition }}
          service: ${{ env.ECS_WORKER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # =========================================================================
  # cron task definition (service なし / EventBridge Scheduler 起動)
  # =========================================================================
  # cron は常駐 service を持たず EventBridge Scheduler が RunTask する。
  # deploy では新 image で task definition の新リビジョンを register するだけでよい。
  # Scheduler は family ARN (revision なし) を参照するため、登録した最新 ACTIVE
  # リビジョンを次回発火時に自動で使う。承認ゲート (approve-api) には依存させない。
  deploy-cron:
    name: Register cron task definition
    needs: [build, migrate]
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register cron task definition with new image
        env:
          IMAGE: ${{ needs.build.outputs.registry }}/${{ env.ECR_CRON_REPO }}:${{ needs.build.outputs.image_tag }}
        run: |
          TASK_DEF_FILE=$(mktemp)
          aws ecs describe-task-definition \
            --task-definition "${ECS_CRON_TASK_DEF}" \
            --query taskDefinition \
            | jq --arg IMAGE "${IMAGE}" '
                .containerDefinitions[0].image = $IMAGE
                | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
              ' > "${TASK_DEF_FILE}"

          REVISION_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://${TASK_DEF_FILE}" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "Registered cron task definition: ${REVISION_ARN}"
