name: Terraform AWS Account CI
# infra/terraform/aws/account（OIDC / IAM / ECR など AWS アカウント単位で共有するリソース）
# 専用の CI。変更頻度が低いためトリガーパスを account/ に限定し、env/dev の PR とは独立に動かす。
#
# fmt と tflint は terraform-aws-env-ci.yml が aws 配下を recursive にチェックするためここでは省略。
# このワークフローでは account/ の validate / trivy / plan のみを行い PR コメントに投稿する。

on:
  pull_request:
    paths:
      - 'infra/terraform/aws/account/**'
      - '.github/workflows/terraform-aws-account-ci.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'infra/terraform/aws/account/**'
      - '.github/workflows/terraform-aws-account-ci.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: '1.12'
  TRIVY_VERSION: '0.59.1'
  WORKING_DIR: infra/terraform/aws/account

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # validate には init が必要だが、バックエンドへの接続は不要
      - name: Terraform Init
        run: terraform init -input=false -backend=false -lockfile=readonly
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/terraform/aws/account
          trivy-config: infra/terraform/aws/account/.trivy.yml
          trivyignores: infra/terraform/aws/account/.trivyignore

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, trivy]
    # PR: 自動 plan + PR コメント投稿。workflow_dispatch: 手動 plan-only（apply 前の事前確認用）。
    # main / develop への push では plan を走らせない（コメント先が無く、apply は terraform-aws-account-apply.yml で別管理）
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    # account も env-scope の AWS_ROLE_ARN（AdministratorAccess attach 済み）を使用
    environment: dev
    permissions:
      id-token: write       # OIDC
      contents: read
      pull-requests: write  # plan 結果を PR コメントに投稿するため
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Terraform Init
        run: terraform init -input=false -lockfile=readonly -lock-timeout=60s
        working-directory: ${{ env.WORKING_DIR }}

      # -detailed-exitcode: 0=変更なし / 1=エラー / 2=変更あり
      # continue-on-error で後続のコメント投稿まで必ず到達させ、最後のステップで失敗を再現する。
      - name: Terraform Plan
        id: plan
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          terraform plan -no-color -input=false -lock-timeout=60s -detailed-exitcode 2>&1 | tee tfplan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        working-directory: ${{ env.WORKING_DIR }}

      # 「Plan: X to add, Y to change, Z to destroy.」の行だけ抽出してサマリ化
      - name: Extract plan summary
        id: summary
        if: steps.plan.outputs.exitcode != '1'
        run: |
          summary=$(grep -E "^Plan: |^No changes\." tfplan.txt | tail -1 || echo "(summary unavailable)")
          {
            echo "summary<<EOF"
            echo "$summary"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        working-directory: ${{ env.WORKING_DIR }}

      # PR に plan 結果をコメント投稿（既存コメントがあれば更新）。
      # marker を account 専用にして env/dev の plan コメント（terraform-aws-env-ci.yml）と独立に扱う。
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          EXITCODE: ${{ steps.plan.outputs.exitcode }}
          SUMMARY: ${{ steps.summary.outputs.summary }}
          PLAN_PATH: ${{ env.WORKING_DIR }}/tfplan.txt
        with:
          script: |
            const fs = require('fs')

            const marker = '<!-- terraform-plan-comment-account -->'
            const exitcode = process.env.EXITCODE
            const summary = process.env.SUMMARY || '(summary unavailable)'
            const planPath = process.env.PLAN_PATH
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`

            // 失敗時も plan 出力 (tee で tfplan.txt に保存済み) を読んでコメントに含める。
            // GitHub コメント上限 65,536 文字を考慮して 60,000 で打ち切り、長すぎる場合は
            // 失敗時は末尾を残す (Terraform のエラーは出力の終盤に出るため)。
            let plan = ''
            try {
              plan = fs.readFileSync(planPath, 'utf8')
            } catch (e) {
              plan = `(could not read plan output: ${e.message})`
            }

            const MAX = 60000
            const truncatedForFailure = plan.length > MAX
              ? `_...先頭を切り詰めて末尾のみ表示。完全なログは [Actions run](${runUrl}) を参照_\n\n` + plan.substring(plan.length - MAX)
              : plan
            const truncatedForSuccess = plan.length > MAX
              ? plan.substring(0, MAX) + `\n\n_...truncated. See the [Actions log](${runUrl}) for the full plan._`
              : plan

            let body
            if (exitcode === '1') {
              body = [
                marker,
                '## ❌ Terraform Plan: Failed (`account`)',
                '',
                `Terraform がエラーを返しました。詳細は [Actions log](${runUrl}) または下記の output を参照。`,
                '',
                '<details open><summary>Plan output (error)</summary>',
                '',
                '```',
                truncatedForFailure,
                '```',
                '',
                '</details>',
              ].join('\n')
            } else {
              const icon = exitcode === '0' ? '✅' : '⚠️'
              const status = exitcode === '0' ? 'No changes' : 'Changes detected'

              body = [
                marker,
                `## ${icon} Terraform Plan: ${status} (\`account\`)`,
                '',
                `**Summary:** \`${summary}\``,
                '',
                '<details><summary>Show plan</summary>',
                '',
                '```hcl',
                truncatedForSuccess,
                '```',
                '',
                '</details>',
                '',
                `_Full log: [Actions run](${runUrl})_`,
              ].join('\n')
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existing = comments.find(c => c.body && c.body.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

      # plan が失敗していたらジョブ自体も失敗させる（PR check を red にする）
      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "Terraform plan failed. See PR comment for details."
          exit 1
