name: E2E

on:
  push:
    paths:
      - 'apps/web/**'
      - 'apps/api/**'
      - 'packages/**'
      - 'turbo.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.pnpmfile.cjs'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: project-template_dev
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/project-template_dev
      REDIS_URL: redis://localhost:6379
      NODE_ENV: development
      PORT: '8080'
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: e2e-test-jwt-secret-do-not-use-in-prod
      JWT_REFRESH_SECRET: e2e-test-jwt-refresh-secret-do-not-use-in-prod
      GOOGLE_CLIENT_ID: dummy
      GOOGLE_CLIENT_SECRET: dummy
      GITHUB_CLIENT_ID: dummy
      GITHUB_CLIENT_SECRET: dummy
      REWARDS_CACHE_DIR: /tmp/e2e-rewards
      REWARDS_PUBLIC_URL_PREFIX: /cache/rewards
      NEXT_PUBLIC_API_URL: http://localhost:8080
      API_URL: http://localhost:8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter "./packages/*" build

      - name: Prisma migrate + seed (dev DB)
        run: |
          pnpm --filter @repo/db db:migrate:deploy
          pnpm --filter @repo/db db:seed
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./apps/web/node_modules/@playwright/test/package.json').version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter web exec playwright install-deps chromium

      - name: Start API server
        run: pnpm --filter api exec tsx src/index.ts &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}

      - name: Build & start Web server
        run: |
          pnpm --filter web exec next build
          pnpm --filter web exec next start -p 3000 &
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}

      - name: Wait for API and Web
        run: |
          npx wait-on -t 60000 http://localhost:8080/api/health http://localhost:3000

      - name: Run Playwright tests
        run: pnpm --filter web e2e
        env:
          CI: 'true'
          E2E_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:8080

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/e2e-results
          retention-days: 7
