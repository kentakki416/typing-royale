name: Terraform AWS Account Apply

# =============================================================================
# infra/terraform/aws/account 配下（OIDC provider / IAM role / ECR など）の
# 変更を適用する。変更頻度が低いため env 層とは別ワークフローに分離。
#
# 使い方:
# 1. PR で terraform-aws-account-ci.yml の plan を確認してからマージ
# 2. main にマージ後、Actions → Terraform AWS Account Apply → Run workflow
#
# OIDC role の trust policy を壊す変更の場合、GitHub Actions が自分自身を
# assume できなくなるため、ローカルから AWS root 資格情報で
# `cd infra/terraform/aws/account && terraform apply` を実行して復旧する。
# =============================================================================

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: terraform-aws-account-apply
  cancel-in-progress: false

env:
  TERRAFORM_VERSION: "1.12"
  AWS_REGION: ap-northeast-1
  WORKING_DIR: infra/terraform/aws/account

jobs:
  apply:
    name: Terraform Account Apply
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # account も env-scope の AWS_ROLE_ARN（AdministratorAccess attach 済み）を使用
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -lockfile=readonly -lock-timeout=120s
        working-directory: ${{ env.WORKING_DIR }}

      # plan を一度走らせて差分を可視化（apply ログだけだと事後追跡しづらいため）
      - name: Terraform Plan
        run: terraform plan -no-color -input=false -lock-timeout=120s -out=tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -no-color -input=false -lock-timeout=120s -auto-approve tfplan
        working-directory: ${{ env.WORKING_DIR }}
