<svg xmlns="http://www.w3.org/2000/svg" width="360" height="80" viewBox="0 0 360 80">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0d0a04"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd54a"/>
      <stop offset="100%" stop-color="#d2992a"/>
    </linearGradient>
    <linearGradient id="topHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd54a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffd54a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd54a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffd54a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd54a" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="360" height="80" rx="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="360" height="80" fill="url(#bg)"/>
    <rect width="360" height="40" fill="url(#topHi)"/>
    <rect x="-140" y="0" width="140" height="80" fill="url(#shimmer)" opacity="0.85" transform="skewX(-18)">
      <animate attributeName="x" from="-180" to="420" dur="3.6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect width="360" height="80" rx="10" fill="none" stroke="url(#accent)" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.65;1;0.65" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="0" width="6" height="80" rx="3" fill="url(#accent)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <text x="22" y="24" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="11" font-weight="700" fill="#ffd54a" letter-spacing="2" style="filter: drop-shadow(0 0 4px #ffd54a)">👑 HALL OF FAME</text>
  <text x="22" y="52" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="22" font-weight="900" fill="#fff" style="filter: drop-shadow(0 0 6px #ffd54a)">RANK #1 · JS</text>
  <text x="22" y="71" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="12" font-weight="700" fill="#ffd54a" opacity="0.9">@kenta</text>
  <text x="338" y="72" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="9" fill="#ffd54a" opacity="0.55" text-anchor="end">typing-royale</text>
</svg>