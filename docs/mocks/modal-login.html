<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>ログイン誘導 - CodeType</title>
<link rel="stylesheet" href="./styles.css" />
</head>
<body>

<!-- 背景にリザルト画面を薄く重ねるイメージ -->
<nav class="topbar">
  <div class="topbar-left">
    <a href="./top.html" class="logo"><span class="accent">code</span>type</a>
  </div>
  <div class="topbar-right">
    <a href="#" class="user-chip guest" title="ログインで記録を保存">
      <span class="guest-avatar">👤</span>
      <span class="user-name">ゲスト</span>
      <span class="user-status">未保存</span>
    </a>
  </div>
</nav>
<div class="container container-narrow" style="opacity: 0.3; filter: blur(2px);">
  <div class="text-center mt-24">
    <h1 class="text-mono" style="font-size: 48px;">732 pts</h1>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="stat-value">752</div><div class="stat-label">文字数</div></div>
    <div class="stat"><div class="stat-value">97.4%</div><div class="stat-label">正確率</div></div>
    <div class="stat"><div class="stat-value">6/8</div><div class="stat-label">完走</div></div>
    <div class="stat"><div class="stat-value">2</div><div class="stat-label">スキップ</div></div>
  </div>
</div>

<div class="modal-overlay">
  <div class="modal" style="position: relative;">
    <button class="modal-close">×</button>
    <div class="text-center">
      <div style="font-size: 48px;">🎯</div>
      <h2>記録を残しませんか？</h2>
      <p class="modal-sub">GitHub でログインすれば、スコアがランキングに反映されて、README に貼れるバッジや達成カードがもらえます。</p>
    </div>

    <div style="display:grid; gap:8px;" class="mb-16">
      <div class="flex-center gap-8 text-sm"><span style="color: var(--success);">✓</span> 言語別ランキングに参加</div>
      <div class="flex-center gap-8 text-sm"><span style="color: var(--success);">✓</span> 動的 SVG バッジ・達成カード PNG</div>
      <div class="flex-center gap-8 text-sm"><span style="color: var(--success);">✓</span> トップ 10 で 3D アイコン + Hall of Fame</div>
      <div class="flex-center gap-8 text-sm"><span style="color: var(--success);">✓</span> ゲスト時の今回のスコアも自動でマージ</div>
    </div>

    <a href="./onboarding.html" class="btn btn-primary btn-block btn-large">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path></svg>
      GitHub でログイン
    </a>
    <button class="btn btn-block mt-8 btn-ghost">今はやめておく</button>

    <div class="text-sm text-muted text-center mt-16">
      ✓ 要求スコープは <code class="inline">read:user</code> のみ<br/>
      ✓ GitHub への書き込みは行いません
    </div>
  </div>
</div>

</body>
</html>
