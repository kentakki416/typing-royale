<svg xmlns="http://www.w3.org/2000/svg" width="360" height="80" viewBox="0 0 360 80">
  <defs>
    <linearGradient id="bgBM" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a1a26"/>
      <stop offset="100%" stop-color="#04101a"/>
    </linearGradient>
    <linearGradient id="acBM" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="topHiBM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmerBM" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e0f2fe" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clipBM">
      <rect width="360" height="80" rx="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clipBM)">
    <rect width="360" height="80" fill="url(#bgBM)"/>
    <rect width="360" height="40" fill="url(#topHiBM)"/>
    <rect x="-140" y="0" width="140" height="80" fill="url(#shimmerBM)" opacity="0.9" transform="skewX(-18)">
      <animate attributeName="x" from="-180" to="420" dur="3.4s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect width="360" height="80" rx="10" fill="none" stroke="url(#acBM)" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.65;1;0.65" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="0" width="6" height="80" rx="3" fill="url(#acBM)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <text x="22" y="24" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="11" font-weight="700" fill="#7dd3fc" letter-spacing="2" style="filter: drop-shadow(0 0 4px rgba(125,211,252,0.55))">🏆 MONTHLY TOP 10</text>
  <text x="22" y="52" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="22" font-weight="900" fill="#fff" style="filter: drop-shadow(0 0 6px rgba(125,211,252,0.35))">2026.06 #1 · TS</text>
  <text x="22" y="71" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="12" font-weight="700" fill="#7dd3fc" opacity="0.9">@sakurai_dev</text>
  <text x="338" y="72" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="9" fill="#7dd3fc" opacity="0.55" text-anchor="end">typing-royale</text>
</svg>
