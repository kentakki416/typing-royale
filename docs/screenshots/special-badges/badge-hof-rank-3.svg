<svg xmlns="http://www.w3.org/2000/svg" width="360" height="80" viewBox="0 0 360 80">
  <defs>
    <linearGradient id="bgB3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c130a"/>
      <stop offset="100%" stop-color="#0d0905"/>
    </linearGradient>
    <linearGradient id="acB3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="topHiB3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmerB3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fcd9b6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fcd9b6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fcd9b6" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clipB3">
      <rect width="360" height="80" rx="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clipB3)">
    <rect width="360" height="80" fill="url(#bgB3)"/>
    <rect width="360" height="40" fill="url(#topHiB3)"/>
    <rect x="-140" y="0" width="140" height="80" fill="url(#shimmerB3)" opacity="0.8" transform="skewX(-18)">
      <animate attributeName="x" from="-180" to="420" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect width="360" height="80" rx="10" fill="none" stroke="url(#acB3)" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.6;0.95;0.6" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="0" width="6" height="80" rx="3" fill="url(#acB3)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <text x="22" y="24" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="11" font-weight="700" fill="#d97706" letter-spacing="2" style="filter: drop-shadow(0 0 4px rgba(217,119,6,0.5))">🥉 HALL OF FAME</text>
  <text x="22" y="52" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="22" font-weight="900" fill="#fff" style="filter: drop-shadow(0 0 6px rgba(217,119,6,0.3))">RANK #3 · JS</text>
  <text x="22" y="71" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="12" font-weight="700" fill="#d97706" opacity="0.95">@tanaka</text>
  <text x="338" y="72" font-family="'Noto Sans JP','Helvetica',sans-serif" font-size="9" fill="#d97706" opacity="0.7" text-anchor="end">typing-royale</text>
