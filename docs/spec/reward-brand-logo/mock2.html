<!doctype html>
<html><head><meta charset="utf-8"><style>
  body { background:#0d0d0f; margin:0; padding:24px; font-family:'Noto Sans JP','Helvetica',sans-serif; width:1080px; }
  .sec { color:#e2e8f0; font-size:15px; font-weight:800; margin:24px 0 10px; letter-spacing:1px; }
  .d { color:#64748b; font-size:11px; margin-bottom:10px; }
  .pair { display:flex; gap:14px; flex-wrap:wrap; }
  .card { position:relative; width:480px; height:252px; border-radius:16px; display:flex; flex-direction:column;
          align-items:center; justify-content:center; color:#fff; overflow:hidden; }
  .card .ico { position:absolute; top:16px; right:18px; }
  .eyebrow { font-size:14px; font-weight:700; letter-spacing:3px; opacity:0.92; }
  .big { font-weight:900; line-height:1.05; margin-top:8px; text-shadow:0 4px 18px rgba(0,0,0,0.45); }
  .usr { font-size:17px; font-weight:700; margin-top:14px; opacity:0.96; }
  .pill { border:1.4px solid rgba(255,255,255,0.5); border-radius:20px; font-size:12px; font-weight:700; margin-top:10px; padding:5px 16px; opacity:0.92; }
  .foot { font-size:10px; margin-top:16px; opacity:0.72; }
</style></head><body>
<div id="root"></div>
<script>
// 本物の typing-royale アイコン（ダークキーキャップ + 王冠 + キャレット）。crown 色をテーマ色に着色（案2）
function icon(px, crown) {
  return `<svg width="${px}" height="${px}" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="60" height="60" rx="15" fill="#1b2430" stroke="#000" stroke-opacity="0.45" stroke-width="2"/>
    <rect x="5" y="5" width="54" height="20" rx="12" fill="#ffffff" opacity="0.06"/>
    <g fill="${crown}">
      <path d="M15 39 L11.5 20 L23 30 L32 16 L41 30 L52.5 20 L49 39 Z"/>
      <rect x="14" y="41.5" width="36" height="7.5" rx="3"/>
    </g>
    <circle cx="32" cy="24" r="2.2" fill="#fff" opacity="0.9"/>
    <circle cx="20" cy="29" r="1.6" fill="#fff" opacity="0.6"/>
    <circle cx="44" cy="29" r="1.6" fill="#fff" opacity="0.6"/>
    <rect x="30" y="53" width="4" height="6.5" rx="1.4" fill="${crown}"/>
  </svg>`;
}

// ---- バッジ (360x80) ----
function badge(t, id) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="450" height="100" viewBox="0 0 360 80">
    <defs>
      <linearGradient id="bg${id}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${t.bgFrom}"/><stop offset="100%" stop-color="${t.bgTo}"/></linearGradient>
      <linearGradient id="ac${id}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${t.accentFrom}"/><stop offset="100%" stop-color="${t.accentTo}"/></linearGradient>
      <clipPath id="cl${id}"><rect width="360" height="80" rx="10"/></clipPath>
    </defs>
    <g clip-path="url(#cl${id})"><rect width="360" height="80" fill="url(#bg${id})"/></g>
    <rect width="360" height="80" rx="10" fill="none" stroke="url(#ac${id})" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="80" rx="3" fill="url(#ac${id})"/>
    <g transform="translate(312,11)">
      <rect x="1" y="1" width="30" height="30" rx="7.5" fill="#1b2430" stroke="#000" stroke-opacity="0.45"/>
      <g transform="scale(0.5)">
        <g fill="${t.accentFrom}"><path d="M15 39 L11.5 20 L23 30 L32 16 L41 30 L52.5 20 L49 39 Z"/><rect x="14" y="41.5" width="36" height="7.5" rx="3"/></g>
        <circle cx="32" cy="24" r="2.2" fill="#fff" opacity="0.9"/><circle cx="20" cy="29" r="1.6" fill="#fff" opacity="0.6"/><circle cx="44" cy="29" r="1.6" fill="#fff" opacity="0.6"/>
        <rect x="30" y="53" width="4" height="6.5" rx="1.4" fill="${t.accentFrom}"/>
      </g>
    </g>
    <text x="22" y="24" font-size="11" font-weight="700" fill="${t.accentFrom}" letter-spacing="2">${t.emoji} ${t.head}</text>
    <text x="22" y="52" font-size="22" font-weight="900" fill="#fff">${t.main}</text>
    <text x="22" y="71" font-size="12" font-weight="700" fill="${t.accentFrom}" opacity="0.9">@kenta</text>
    <text x="338" y="72" font-size="9" fill="${t.accentFrom}" opacity="0.55" text-anchor="end">typing-royale</text>
  </svg>`;
}

const GOLD = { accentFrom:'#ffd54a', accentTo:'#d2992a', bgFrom:'#1a1208', bgTo:'#0d0a04', emoji:'👑', head:'HALL OF FAME', main:'1位 · Go' };
const BLUE = { accentFrom:'#7dd3fc', accentTo:'#0c4a6e', bgFrom:'#0a1a26', bgTo:'#04101a', emoji:'🏆', head:'MONTHLY TOP 10', main:'2026.06 3位 · Go' };

// ---- カード (1200x630 を 0.4 で表示) ----
function card(opts) {
  return `<div class="card" style="background:linear-gradient(180deg, ${opts.from} 0%, ${opts.to} 100%)">
    <div class="ico">${icon(40, opts.crown)}</div>
    <div class="eyebrow" style="text-shadow:0 0 14px ${opts.crown}">${opts.eyebrow}</div>
    ${opts.small ? `<div style="font-size:26px;font-weight:900;margin-top:8px">${opts.small}</div>` : ''}
    <div class="big" style="font-size:${opts.bigSize}px;text-shadow:0 4px 18px rgba(0,0,0,.45),0 0 16px ${opts.crown}">${opts.big}</div>
    <div class="usr">@kenta</div>
    ${opts.pill ? `<div class="pill">${opts.pill}</div>` : ''}
    <div class="foot">${opts.foot}</div>
  </div>`;
}

const root = document.getElementById('root');
root.innerHTML = `
  <div class="sec">採用案: 案2（右上・テーマ色）＋ 本物の typing-royale アイコン ＋「N位」表記</div>
  <div class="d">アイコン = ダークキーキャップ＋王冠＋キャレット。王冠をバッジ/カードのテーマ色で着色。</div>

  <div class="sec" style="font-size:13px">■ バッジ（殿堂入り 金 / 月間 青）</div>
  <div class="pair">${badge(GOLD,'g')}${badge(BLUE,'b')}</div>

  <div class="sec" style="font-size:13px">■ 達成カード（1200×630）3 種</div>
  <div class="pair">
    ${card({ from:'#5a3d99', to:'#2d1d4e', crown:'#e9d5ff', eyebrow:'🏆 GRADE UP', big:'STAFF<br>ENGINEER', bigSize:46, foot:'2026-06-29 — Typing Royale' })}
    ${card({ from:'#ffd54a', to:'#8a5a0a', crown:'#fff7d6', eyebrow:'👑 HALL OF FAME', big:'1位', bigSize:96, pill:'Go', foot:'Typing Royale' })}
    ${card({ from:'#7dd3fc', to:'#0c4a6e', crown:'#e0f2fe', eyebrow:'🏆 MONTHLY TOP 10', small:'2026.06', big:'3位', bigSize:84, pill:'Go', foot:'Typing Royale' })}
  </div>
`;
</script>
</body></html>
