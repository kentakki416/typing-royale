services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: typing-royale-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: typing_royale_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: typing-royale-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # API Server
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: typing-royale-api
    restart: unless-stopped
    environment:
      NODE_ENV: local
      PORT: 8080
      DATABASE_URL: postgresql://postgres:password@postgres:5432/typing_royale_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRATION: 7d
      GITHUB_CLIENT_ID: dummy
      GITHUB_CLIENT_SECRET: dummy
      GITHUB_CALLBACK_URL: http://localhost:3000/api/auth/callback/github
      SENTRY_DSN: ""
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # Crawler / Batch (週次 / 毎時のスケジュール起動を想定。ローカルでは pnpm crawler:run で都度実行)
  crawler:
    build:
      context: .
      dockerfile: apps/crawler/Dockerfile
    container_name: typing-royale-crawler
    profiles:
      - crawler
    environment:
      NODE_ENV: local
      DATABASE_URL: postgresql://postgres:password@postgres:5432/typing_royale_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GITHUB_PAT: ""
      CRAWLER_REPOS_PER_RUN: "1"
      SENTRY_DSN: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
